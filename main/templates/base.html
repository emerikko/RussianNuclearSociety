{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <title>{% block title %}Russian Nuclear Society{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom"> 
        <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto align-items-center">
            <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:home' %}">Главная</a> 
            <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:educ' %}">Образование и карьера</a> 
            <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:materials' %}">Материалы</a> 
            <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:events' %}">Мероприятия</a> 
            <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:about_us' %}">О нас</a>
            
            {% if user.is_authenticated %}
                <!-- пользователь вошел -->
                <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:profile' %}">Мой профиль</a>
                <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:logout' %}" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                    Выйти ({{ user.username }})
                </a>
                <form id="logout-form" method="post" action="{% url 'main:logout' %}" style="display: none;">
                    {% csrf_token %}
                </form>
            {% else %}
                <!-- пользователь НЕ вошел -->
                <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main:login' %}">Вход</a>
            {% endif %}
            
            <!-- Theme Toggle Button -->
            <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </nav> 
    </div>    
    
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Theme switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;
            
            // Check for saved theme preference or default to 'light'
            const currentTheme = localStorage.getItem('theme') || 'light';
            
            // Apply the saved theme
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                body.removeAttribute('data-theme');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
            
            // Theme toggle event listener
            themeToggle.addEventListener('click', function() {
                const isDark = body.getAttribute('data-theme') === 'dark';
                
                if (isDark) {
                    // Switch to light theme
                    body.removeAttribute('data-theme');
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                    localStorage.setItem('theme', 'light');
                } else {
                    // Switch to dark theme
                    body.setAttribute('data-theme', 'dark');
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                    localStorage.setItem('theme', 'dark');
                }
            });
        });
    </script>
</body>
</html>
