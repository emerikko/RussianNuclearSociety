{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <title>{% block title %}Russian Nuclear Society{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar-custom">
        <div class="container-fluid d-flex align-items-center">
            <a href="{% url 'main:home' %}" class="d-flex align-items-center text-decoration-none">
                <img src="{% static 'img/icon.png' %}" alt="Russian Nuclear Society" class="navbar-logo">
            </a>
            <div class="d-flex align-items-center ms-auto">
                <a class="nav-link-custom" href="{% url 'main:home' %}">Главная</a> 
                <a class="nav-link-custom" href="{% url 'main:educ' %}">Образование и карьера</a> 
                <a class="nav-link-custom" href="{% url 'main:materials' %}">Материалы</a> 
                <a class="nav-link-custom" href="{% url 'main:events' %}">Мероприятия</a> 
                <a class="nav-link-custom" href="{% url 'main:about_us' %}">О нас</a>
                
                {% if user.is_authenticated %}
                    <a class="nav-link-custom" href="{% url 'main:profile' %}">Мой профиль</a>
                    <a class="nav-link-custom" href="{% url 'main:logout' %}" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                        Выйти ({{ user.username }})
                    </a>
                    <form id="logout-form" method="post" action="{% url 'main:logout' %}" style="display: none;">
                        {% csrf_token %}
                    </form>
                {% else %}
                    <a class="nav-link-custom" href="{% url 'main:login' %}">Вход</a>
                {% endif %}
                
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer-custom mt-5 py-4">
        <div class="container-fluid d-flex align-items-center">
            <a href="{% url 'main:home' %}" class="d-flex align-items-center text-decoration-none">
                <img src="{% static 'img/icon.png' %}" alt="Russian Nuclear Society" class="footer-logo">
            </a>
            <div class="ms-auto">
                <span class="footer-text">2013-<span id="currentYear"></span></span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Theme switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;
            
            // Check for saved theme preference or default to 'light'
            const currentTheme = localStorage.getItem('theme') || 'light';
            
            // Apply the saved theme
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'dark');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                body.removeAttribute('data-theme');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
            
            // Theme toggle event listener
            themeToggle.addEventListener('click', function() {
                const isDark = body.getAttribute('data-theme') === 'dark';
                
                if (isDark) {
                    // Switch to light theme
                    body.removeAttribute('data-theme');
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                    localStorage.setItem('theme', 'light');
                } else {
                    // Switch to dark theme
                    body.setAttribute('data-theme', 'dark');
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                    localStorage.setItem('theme', 'dark');
                }
            });

            // Active page highlighting
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link-custom');
            
            navLinks.forEach(link => {
                const linkPath = new URL(link.href).pathname;
                if (currentPath === linkPath || 
                    (linkPath !== '/' && currentPath.startsWith(linkPath))) {
                    link.classList.add('active');
                }
            });

            // Set current year in footer
            document.getElementById('currentYear').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
