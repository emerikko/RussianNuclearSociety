{% extends 'main/base.html' %}

{% block title %}Вход - Российское ядерное сообщество{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Вход</h2>
                    
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        Неправильный логин или пароль. Пожалуйста, попробуйте снова.
                    </div>
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Логин" name="username" required>
                            <label for="username">Логин</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
                            <label for="password">Пароль</label>
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
